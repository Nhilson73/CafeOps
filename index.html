<!DOCTYPE html>
<html lang="es-419" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="CafeOps · Coffee Operating System. Un marco abierto para la transformación técnica, económica y humana del sector cafetero mundial.">
  <meta name="author" content="Cafelium Foundation">
  <meta name="theme-color" content="#0B0B0B">
  <title>CafeOps · Coffee Operating System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css?v=3">
</head>
<body>
  <a class="skip-link" href="#content">Saltar al contenido</a>

  <header class="hero" id="top">
    <div class="hero-backdrop" aria-hidden="true"></div>
    <div class="hero-grid" aria-hidden="true"></div>
    <div class="hero-inner">
      <p class="hero-kicker" id="hero-kicker">Cafelium Foundation · Edición Institucional · Mayo 2026 · CC BY-SA 4.0</p>
      <h1 class="hero-title" id="hero-title">CafeOps</h1>
      <p class="hero-subtitle" id="hero-subtitle">Coffee Operating System</p>
      <p class="hero-tagline" id="hero-tagline">Un marco abierto para la transformación técnica, económica y humana del sector cafetero mundial.</p>
      <div class="hero-actions">
        <button id="btn-start" class="btn btn-primary" type="button">Escuchar desde el inicio</button>
        <a class="btn btn-secondary" href="#content">Leer el libro</a>
      </div>
      <p class="hero-dedication" id="hero-dedication"></p>
    </div>
  </header>

  <div class="layout" id="content">
    <nav class="toc" aria-label="Tabla de contenidos">
      <button id="toc-toggle" class="toc-toggle" aria-expanded="false" aria-controls="toc-tree" type="button">
        <span class="toc-toggle-icon" aria-hidden="true">≡</span>
        <span class="toc-toggle-label">Índice</span>
      </button>
      <div id="toc-tree" class="toc-tree" role="navigation"></div>
    </nav>

    <main class="main">
      <article id="manuscript" class="manuscript" aria-label="Manuscrito CafeOps"></article>
    </main>
  </div>

  <div class="player" id="player" role="region" aria-label="Reproductor de lectura en voz alta">
    <div class="player-track">
      <div class="player-progress" id="player-progress"></div>
    </div>
    <div class="player-inner">
      <div class="player-group">
        <button id="tts-back" class="player-btn" type="button" aria-label="Retroceder frase" title="Retroceder frase">«</button>
        <button id="tts-play" class="player-btn player-play" type="button" aria-label="Reproducir" title="Reproducir">▶</button>
        <button id="tts-pause" class="player-btn player-play" type="button" aria-label="Pausar" title="Pausar" hidden>⏸</button>
        <button id="tts-stop" class="player-btn" type="button" aria-label="Detener" title="Detener">⏹</button>
        <button id="tts-forward" class="player-btn" type="button" aria-label="Avanzar frase" title="Avanzar frase">»</button>
      </div>
      <div class="player-info" id="player-info">Listo para leer en voz alta</div>
      <div class="player-group player-controls">
        <label class="player-label" for="tts-rate">Vel.</label>
        <select id="tts-rate" class="player-select" title="Velocidad">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1×</option>
          <option value="1.2">1.2×</option>
          <option value="1.5">1.5×</option>
          <option value="1.8">1.8×</option>
        </select>
        <label class="player-label" for="tts-voice">Voz</label>
        <select id="tts-voice" class="player-select" title="Voz"></select>
        <button id="theme-toggle" class="player-btn" type="button" aria-label="Cambiar tema" title="Cambiar tema">☀</button>
      </div>
    </div>
  </div>

  <button id="back-to-top" class="back-to-top" type="button" aria-label="Volver arriba">↑</button>

  <script src="assets/marked.min.js?v=3"></script>
  <script src="assets/app.js?v=3"></script>
</body>
</html>
